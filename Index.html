<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    textarea {
      width: 80%;
      height: 80px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .note {
      background: #1e293b;
      margin: 10px auto;
      padding: 15px;
      width: 80%;
      border-radius: 8px;
      text-align: left;
      position: relative;
    }

    .delete {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      border: none;
      padding: 5px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>

<body>

<h1>Notes App</h1>

<textarea id="noteInput" placeholder="Write your note..."></textarea>
<br>
<button onclick="addNote()">Add Note</button>

<div id="notesContainer"></div>

<script>
  let notes = JSON.parse(localStorage.getItem("notes")) || [];

  function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
  }

  function renderNotes() {
    let container = document.getElementById("notesContainer");
    container.innerHTML = "";

    notes.forEach((note, index) => {
      let div = document.createElement("div");
      div.className = "note";

      div.innerHTML = `
        <button class="delete" onclick="deleteNote(${index})">X</button>
        ${note}
      `;

      container.appendChild(div);
    });
  }

  function addNote() {
    let input = document.getElementById("noteInput");
    let text = input.value.trim();

    if (text === "") return;

    notes.push(text);
    saveNotes();
    renderNotes();

    input.value = "";
  }

  function deleteNote(index) {
    notes.splice(index, 1);
    saveNotes();
    renderNotes();
  }

  renderNotes();
</script>

</body>
  </html>
